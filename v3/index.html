
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Galaxy Elegance Invitation</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

</head>

<body>

<canvas id="galaxy-canvas"></canvas>

<div id="envelopeIntro" class="envelope">
    <div class="envelope-card">
        <h1>Royal Invitation</h1>
        <button id="openInvite">Open Invitation</button>
    </div>
</div>

<main id="mainContent" class="hidden">

<section class="hero glass">
<h1 class="title">The Wedding Celebration</h1>
<p>Royal Galaxy Elegance Theme</p>
</section>

<section class="gallery glass">
<h2>Gallery</h2>
<div class="gallery-grid">
<img src="assets/photo1.jpg" class="tilt">
<img src="assets/photo2.jpg" class="tilt">
<img src="assets/photo3.jpg" class="tilt">
</div>
</section>

<section class="rsvp glass">
<h2>RSVP</h2>
<form id="rsvpForm">
<input type="text" id="name" placeholder="Nama Anda">
<select id="status">
<option value="hadir">Hadir</option>
<option value="tidak">Tidak Hadir</option>
</select>
<button type="submit">Kirim</button>
</form>
</section>

<section class="guestbook glass">
<h2>Guestbook</h2>
<div id="messages"></div>
</section>

</main>

<script src="webgl-app.js"></script>
<script src="main.js"></script>

</body>
</html>
